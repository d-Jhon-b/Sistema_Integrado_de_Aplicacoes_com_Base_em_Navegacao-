  <circle cx="420" cy="130" r="52" fill="none" stroke="white" stroke-width="4" stroke-opacity="0.4" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="420" y="145" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:serif;font-size:38px;font-weight:700;text-anchor:middle;dominant-baseline:central">£</text>
  <text x="420" y="212" fill="#7D3C98" style="fill:rgb(125, 60, 152);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:15px;font-weight:700;text-anchor:middle;dominant-baseline:auto">GBP</text>

